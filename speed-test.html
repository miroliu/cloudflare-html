<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页速度测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .url-input-group {
            margin-bottom: 30px;
        }

        .url-input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .url-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .test-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .test-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .test-btn.testing {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .result-value {
            font-weight: 600;
            font-size: 1.1rem;
            color: #00d4ff;
        }

        .result-value.good {
            color: #10b981;
        }

        .result-value.medium {
            color: #f59e0b;
        }

        .result-value.slow {
            color: #ef4444;
        }

        .score-ring {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            position: relative;
        }

        .score-ring svg {
            transform: rotate(-90deg);
            width: 150px;
            height: 150px;
        }

        .score-ring circle {
            fill: none;
            stroke-width: 10;
        }

        .score-ring .bg {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .score-ring .progress {
            stroke: url(#gradient);
            stroke-linecap: round;
            stroke-dasharray: 408;
            stroke-dashoffset: 408;
            transition: stroke-dashoffset 1s ease;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 8px;
            border-left: 3px solid #ffc107;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .history {
            margin-top: 30px;
        }

        .history-title {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .clear-history:hover {
            color: #ef4444;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        .history-item .url {
            color: rgba(255, 255, 255, 0.5);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .history-item .time {
            color: #00d4ff;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 网页速度测试</h1>
        <p class="subtitle">测量网页加载时间和性能指标</p>

        <div class="url-input-group">
            <label for="urlInput">请输入要测试的网址</label>
            <input type="url" id="urlInput" class="url-input" placeholder="https://example.com"
                value="https://www.baidu.com">
        </div>

        <button id="testBtn" class="test-btn" onclick="startTest()">
            开始测试
        </button>

        <div class="results" id="results">
            <div class="score-ring">
                <svg viewBox="0 0 150 150">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00d4ff" />
                            <stop offset="100%" style="stop-color:#7c3aed" />
                        </linearGradient>
                    </defs>
                    <circle class="bg" cx="75" cy="75" r="65" />
                    <circle class="progress" id="scoreCircle" cx="75" cy="75" r="65" />
                </svg>
                <div class="score-text">
                    <div class="score-number" id="scoreNumber">--</div>
                    <div class="score-label">综合评分</div>
                </div>
            </div>

            <div class="result-item">
                <span class="result-label">🌐 DNS 解析</span>
                <span class="result-value" id="dnsTime">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">🔗 TCP 连接</span>
                <span class="result-value" id="tcpTime">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">📡 TTFB (首字节)</span>
                <span class="result-value" id="ttfbTime">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">📄 DOM 加载完成</span>
                <span class="result-value" id="domTime">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">🎨 页面渲染完成</span>
                <span class="result-value" id="loadTime">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">💾 页面大小</span>
                <span class="result-value" id="pageSize">--</span>
            </div>

            <div class="tips" id="tips">
                建议优化提示将显示在这里
            </div>
        </div>

        <div class="history" id="historySection">
            <div class="history-title">
                <span>测试历史</span>
                <button class="clear-history" onclick="clearHistory()">清空</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script src="speed-test.js"></script>
</body>

</html>
